<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <title>Gestion des Comptes Bancaires</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <style>
        body { background: #f8f9fa; }
        .card { border: none; box-shadow: 0 2px 12px rgba(0,0,0,.08); border-radius: 12px; }
        .solde-positive { color: #198754; font-weight: bold; }
        .solde-negative { color: #dc3545; font-weight: bold; }
        /* jQuery UI autocomplete au-dessus de Bootstrap */
        .ui-autocomplete { z-index: 9999 !important; max-height: 220px; overflow-y: auto; }
        .rib-badge { font-family: monospace; font-size: 0.85rem; letter-spacing: .03em; }
        .table th { font-size: 0.85rem; text-transform: uppercase; letter-spacing: .05em; color: #6c757d; }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <!-- Clic sur le logo → retour à la page principale (liste clients) -->
        <a class="navbar-brand fw-bold" th:href="@{/clients}" style="cursor:pointer;">
            🏦 BanqueApp
        </a>
        <div class="d-flex gap-3">
            <a class="nav-link text-white" th:href="@{/clients}">
                <i class="bi bi-people-fill me-1"></i>Clients
            </a>
            <a class="nav-link text-white" th:href="@{/comptes}">
                <i class="bi bi-bank me-1"></i>Comptes
            </a>
        </div>
    </div>
</nav>

<div class="container">
<div class="row g-4">

<!-- ══════════════════════════════════════════════════════ -->
<!--  FORMULAIRE COMPTE                                     -->
<!-- ══════════════════════════════════════════════════════ -->
<div class="col-lg-4">

    <div class="card">
        <div class="card-header bg-primary text-white fw-bold">
            <span th:text="${compteForm.rib != null} ? '✏️ Modifier Compte' : '➕ Nouveau Compte'">
                Nouveau Compte
            </span>
        </div>

        <div class="card-body">
            <form th:action="${compteForm.rib != null} ? @{/comptes/modifier} : @{/comptes/creer}"
                  th:object="${compteForm}" method="post">

                <!-- RIB caché (auto-généré, non modifiable) -->
                <input type="hidden" th:field="*{rib}"/>

                <!--
                    RELATION ONE-TO-MANY :
                    CompteDTO contient `clientCin` (String) — la FK vers Client.
                    Ce champ caché est rempli par l'autocomplete JavaScript ci-dessous.
                    Le contrôleur lit @RequestParam("clientCin") ou @ModelAttribute CompteDTO.
                -->
                <input type="hidden" name="clientCin" id="clientCinHidden"
                       th:value="${compteForm.clientCin}"/>

                <!-- ── Autocomplete : recherche du client ── -->
                <div class="mb-3">
                    <label class="form-label fw-bold">
                        <i class="bi bi-person me-1"></i>Client
                    </label>
                    <input type="text"
                           id="clientSearch"
                           class="form-control"
                           placeholder="CIN, nom ou prénom…"
                           th:value="${compteForm.clientNomComplet}"
                           autocomplete="off"/>
                    <small class="text-muted">Commencez à taper pour rechercher un client</small>
                    <div id="clientSearchError" class="text-danger small mt-1 d-none">
                        Veuillez sélectionner un client dans la liste.
                    </div>
                </div>

                <!-- ── Solde initial ── -->
                <div class="mb-3">
                    <label class="form-label fw-bold">
                        <i class="bi bi-cash-stack me-1"></i>Solde initial (€)
                    </label>
                    <div class="input-group">
                        <span class="input-group-text">€</span>
                        <input type="number" step="0.01"
                               th:field="*{solde}"
                               class="form-control"
                               placeholder="0.00"
                               required/>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                    <i class="bi bi-check-lg me-1"></i> Valider
                </button>

                <a th:if="${compteForm.rib != null}"
                   th:href="@{/comptes}"
                   class="btn btn-secondary w-100 mt-2">
                    <i class="bi bi-plus-lg me-1"></i> Nouveau Compte
                </a>
            </form>
        </div>
    </div>

    <!-- STATISTIQUES -->
    <div class="card mt-3">
        <div class="card-body">
            <h6 class="fw-bold text-primary"><i class="bi bi-graph-up me-1"></i>Statistiques</h6>
            <hr class="my-2"/>
            <div class="d-flex justify-content-between">
                <span class="text-muted">Total des comptes :</span>
                <span class="fw-bold" th:text="${totalComptes}">0</span>
            </div>
            <div class="d-flex justify-content-between mt-2">
                <span class="text-muted">Capital total :</span>
                <span class="fw-bold text-success">
                    € <span th:text="${#numbers.formatDecimal(capitalTotal, 1, 2, 'COMMA')}">0,00</span>
                </span>
            </div>
        </div>
    </div>

</div><!-- fin col-lg-4 -->

<!-- ══════════════════════════════════════════════════════ -->
<!--  LISTE DES COMPTES                                     -->
<!-- ══════════════════════════════════════════════════════ -->
<div class="col-lg-8">

    <div class="card">
        <div class="card-header fw-bold text-primary bg-white">
            <i class="bi bi-bank2 me-1"></i> Liste des Comptes Bancaires
        </div>

        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>RIB</th>
                            <th>Solde</th>
                            <!--
                                RELATION MANY-TO-ONE :
                                Chaque compte est lié à UN client (c.client ou c.clientNomComplet).
                                On affiche le nom + CIN du client propriétaire.
                            -->
                            <th>Client</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="c : ${comptes}" th:id="'compte-' + ${c.rib}">

                            <td class="rib-badge" th:text="${c.rib}"></td>

                            <td>
                                <span th:classappend="${c.solde >= 0} ? 'solde-positive' : 'solde-negative'"
                                      th:text="'€ ' + ${#numbers.formatDecimal(c.solde, 1, 2, 'COMMA')}">
                                </span>
                            </td>

                            <!--
                                Ici on utilise clientNomComplet et clientCin du CompteDTO.
                                Ces champs sont renseignés dans CompteService.toDTO(compte) :
                                    dto.setClientCin(compte.getClient().getCin())
                                    dto.setClientNomComplet(compte.getClient().getNom() + " " + ...)
                            -->
                            <td>
                                <i class="bi bi-person-circle text-secondary me-1"></i>
                                <span th:text="${c.clientNomComplet}">—</span><br/>
                                <small class="text-muted font-monospace"
                                       th:text="'(' + ${c.clientCin} + ')'"></small>
                            </td>

                            <td>
                                <a th:href="@{/comptes/modifier/{rib}(rib=${c.rib})}"
                                   class="btn btn-warning btn-sm me-1"
                                   title="Modifier">
                                    <i class="bi bi-pencil-fill"></i>
                                </a>
                                <button class="btn btn-danger btn-sm"
                                        th:data-rib="${c.rib}"
                                        th:data-client="${c.clientNomComplet}"
                                        onclick="supprimerCompte(this)"
                                        title="Supprimer">
                                    <i class="bi bi-trash-fill"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>

                    <tfoot th:if="${#lists.isEmpty(comptes)}">
                        <tr>
                            <td colspan="4" class="text-center text-muted py-5">
                                <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                Aucun compte bancaire enregistré
                            </td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>

</div><!-- fin col-lg-8 -->

</div><!-- fin row -->
</div><!-- fin container -->

<!-- ══════════════════════════════════════════════════════ -->
<!--  Scripts                                               -->
<!-- ══════════════════════════════════════════════════════ -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
$(document).ready(function () {

    /* ─────────────────────────────────────────────────────
     *  AUTOCOMPLETE JQUERY UI
     *  Endpoint attendu : GET /clients/search?term=xxx
     *  Retourne JSON :  [ { cin, nom, prenom }, … ]
     *
     *  RELATION ONE-TO-MANY exploitée côté serveur :
     *  ClientRepository.findByCinContaining… renvoit des Client
     *  dont chacun possède List<Compte> (mais on n'en a pas besoin ici).
     * ───────────────────────────────────────────────────── */
    $("#clientSearch").autocomplete({
        source: function (request, response) {
            $.getJSON("/clients/search", { term: request.term }, function (data) {
                response($.map(data, function (client) {
                    return {
                        label : client.nom + " " + client.prenom + " (" + client.cin + ")",
                        value : client.nom + " " + client.prenom,
                        cin   : client.cin
                    };
                }));
            });
        },
        minLength: 1,
        select: function (event, ui) {
            // Remplir le champ visible et la FK cachée
            $(this).val(ui.item.label);
            $("#clientCinHidden").val(ui.item.cin);
            $("#clientSearchError").addClass("d-none");
            return false; // empêche jQuery UI d'écraser le champ avec .value
        },
        change: function (event, ui) {
            if (!ui.item) {
                // L'utilisateur a tapé quelque chose sans sélectionner → on vide
                $(this).val("");
                $("#clientCinHidden").val("");
            }
        }
    });

    /* ─── Validation côté client avant soumission ─── */
    $("form").on("submit", function (e) {
        if (!$("#clientCinHidden").val()) {
            e.preventDefault();
            $("#clientSearchError").removeClass("d-none");
            $("#clientSearch").focus();
        }
    });
});

/* ─── Suppression d'un compte via AJAX (DELETE) ─── */
function supprimerCompte(btn) {
    const rib    = $(btn).data("rib");
    const client = $(btn).data("client");

    Swal.fire({
        title: "Supprimer le compte ?",
        html : `RIB : <strong>${rib}</strong><br>Client : ${client}`,
        icon : "warning",
        showCancelButton : true,
        confirmButtonColor: "#d33",
        confirmButtonText : "Oui, supprimer",
        cancelButtonText  : "Annuler"
    }).then((result) => {
        if (result.isConfirmed) {
            $.ajax({
                /*
                 * Endpoint REST :  DELETE /comptes/delete/{rib}
                 * Si le contrôleur utilise POST + @RequestParam :
                 *   url  : "/comptes/delete",
                 *   type : "POST",
                 *   data : { rib : rib }
                 */
                url : "/comptes/delete/" + rib,
                type: "DELETE",
                success: function (response) {
                    if (response.success) {
                        $("#compte-" + rib).fadeOut(300, function () {
                            $(this).remove();
                            Swal.fire("Supprimé !", response.message || "Compte supprimé avec succès.", "success")
                                .then(() => location.reload());
                        });
                    } else {
                        Swal.fire("Erreur", response.message, "error");
                    }
                },
                error: function (xhr) {
                    const msg = xhr.responseJSON?.message || "Impossible de supprimer ce compte.";
                    Swal.fire("Erreur serveur", msg, "error");
                }
            });
        }
    });
}
</script>

</body>
</html>
